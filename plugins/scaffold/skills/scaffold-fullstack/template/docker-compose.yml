services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      network: host
    ports:
      - "8080:8080"
    depends_on:
      - backend
